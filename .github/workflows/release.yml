name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Show versions
        run: |
          node -v
          npm -v

      - name: Install
        run: npm ci

      - name: Get version from tag
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          npm version "$VERSION" --no-git-tag-version

      - name: Verify package
        run: |
          cat package.json
          npm pkg get name
          npm pkg get version

      - name: Build
        run: npm run build

      - name: Pack
        run: npm pack

      - name: Publish to npm
        run: npm publish --provenance --access public